{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{% block title %}Movie - TRACK{% endblock %}</title>

	<!-- CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

	<!-- Fonte Garet -->
	<link href="https://fonts.googleapis.com/css2?family=Garet&display=swap" rel="stylesheet">

	<style>
		body {
			font-family: 'Garet', sans-serif;
			background-color: #ffffff;
			color: #162239;
		}

		.container {
			padding-top: 50px;
		}

		h1, h2 {
			color: #162239;
		}

		/* Estilo dos botões */
		.btn {
			font-size: 16px;
			border: none;
		}

		/* Botão principal (azul) */
		.btn-primary {
			background-color: #162239;
			color: white;
		}
		.btn-primary:hover {
			background-color: #284783;
		}

		/* Botão de sucesso (verde) */
		.btn-success {
			background-color: #358d07;
			color: white;
		}
		.btn-success:hover {
			background-color: #b8955f;
		}

		/* Botão de perigo (vermelho) */
		.btn-danger {
			background-color: #dc3545;
			color: white;
		}
		.btn-danger:hover {
			background-color: #c32f2f;
		}

		/* Botão de outline (borda) */
		.btn-outline-primary {
			color: #162239;
			border-color: #162239;
		}
		.btn-outline-primary:hover {
			background-color: #162239;
			color: white;
		}

		.explanation-text {
			margin-top: 20px;
			font-size: 18px;
			color: #162239;
		}
	</style>
</head>
<body>

	{% if user.is_authenticated %}
	<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #162239;">
		<div class="container-fluid px-4">
			<a class="navbar-brand" href="{% url 'listar_filmes' %}">MovieTrack</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item">
						<a class="nav-link" href="{% url 'listar_filmes' %}">Meus Filmes</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="{% url 'logout' %}">Sair</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>
	{% endif %}

	<div class="container">
		{% block content %}
		{% endblock %}
	</div>

	<!-- JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
