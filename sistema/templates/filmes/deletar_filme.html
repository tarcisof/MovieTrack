{% extends 'base.html' %}

{% block title %}Excluir Filme - MovieTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4 text-center">
                <h2 class="text-danger mb-4">Excluir Filme</h2>
                <p class="explanation-text">Tem certeza que deseja excluir o filme <strong>"{{ filme.titulo }}"</strong>?</p>
                <p class="text-muted small mb-4">Esta ação não pode ser desfeita.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'listar_filmes' %}" class="btn btn-outline-primary">Cancelar</a>
                        <button type="submit" class="btn btn-danger px-4">Sim, Excluir</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
